name: Semgrep SAST Scan
description: 'Run Semgrep static analysis security testing'
inputs:
  semgrep-working-directory:
    description: 'Working directory for Semgrep'
    required: false
    default: '.'
  semgrep-config:
    description: 'Semgrep config(s) to use. Use YAML block scalar syntax with |- and list each config on a new line (e.g., semgrep-config: |-\n  p/security-audit\n  p/owasp-top-ten\n  p/php\n  p/java\n  p/javascript\n  p/typescript\n  p/nodejs)'
    required: false
    default: 'auto'
  semgrep-fail-on-confidence:
    description: 'Fail the pipeline when ERROR findings exist at or above this confidence level. Leave empty to disable. Options: LOW, MEDIUM, HIGH'
    required: false
    default: ''
  semgrep-exclude-patterns:
    description: 'CLI exclude patterns to preserve Semgrep defaults. Use YAML block scalar syntax with |- and list each pattern on a new line either directories or files (e.g., exclude-patterns: |-\n  IntegrationTests/\n  renovate.json)'
    required: false
    default: ''
  semgrep-disable-rules:
    description: 'Specific rule IDs to disable (newline-separated, e.g., disable-rules: |-\n  java.lang.security.sql-injection\n  python.django.security.injection.sql-injection)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set Up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install Semgrep (v1.162.0)
      shell: bash
      run: pip install semgrep==1.162.0

    - name: Run Semgrep Scan
      shell: bash
      working-directory: ${{ inputs.semgrep-working-directory }}
      env:
        SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
        SEMGREP_EXCLUDE_PATTERNS: ${{ inputs.semgrep-exclude-patterns }}
        SEMGREP_DISABLE_RULES: ${{ inputs.semgrep-disable-rules }}
        SEMGREP_FAIL_ON_CONFIDENCE: ${{ inputs.semgrep-fail-on-confidence }}
      run: |
        # Build config flags if provided
        CONFIG_FLAGS=()
        if [ -n "$SEMGREP_CONFIG" ]; then
          while IFS= read -r config; do
            if [ -n "$config" ]; then
              CONFIG_FLAGS+=(--config "$config")
            fi
          done <<< "$SEMGREP_CONFIG"
        fi

        # Build exclude flags if provided (uses CLI, preserves defaults)
        EXCLUDE_FLAGS=()
        if [ -n "$SEMGREP_EXCLUDE_PATTERNS" ]; then
          while IFS= read -r pattern; do
            if [ -n "$pattern" ]; then
              EXCLUDE_FLAGS+=(--exclude "$pattern")
            fi
          done <<< "$SEMGREP_EXCLUDE_PATTERNS"
        fi

        # Build exclude rules flags if provided
        EXCLUDE_RULES_FLAGS=()
        if [ -n "$SEMGREP_DISABLE_RULES" ]; then
          while IFS= read -r rule; do
            if [ -n "$rule" ]; then
              EXCLUDE_RULES_FLAGS+=(--exclude-rule "$rule")
            fi
          done <<< "$SEMGREP_DISABLE_RULES"
        fi

        # Run semgrep scan (ignore exit code since we handle errors ourselves)
        semgrep ci \
          "${CONFIG_FLAGS[@]}" \
          --json \
          --output="semgrep-findings.json" \
          "${EXCLUDE_FLAGS[@]}" \
          "${EXCLUDE_RULES_FLAGS[@]}" 2>&1 | grep -v "Has findings for blocking rules" || true

        # Fail on ERROR severity findings when a confidence threshold is configured
        if [ -f "semgrep-findings.json" ]; then
          FAIL_ON_CONFIDENCE="${{ inputs.semgrep-fail-on-confidence }}"
          ERROR_COUNT="0"

          get_error_count() {
            local jq_filter="$1"

            if ! command -v jq >/dev/null 2>&1; then
              echo "❌ Pipeline failed: jq is required to evaluate semgrep-fail-on-confidence, but it is not installed." >&2
              exit 1
            fi

            local jq_output
            if ! jq_output=$(jq "$jq_filter" semgrep-findings.json); then
              echo "❌ Pipeline failed: Unable to parse semgrep-findings.json to evaluate semgrep-fail-on-confidence." >&2
              exit 1
            fi

            printf '%s\n' "$jq_output"
          }

          if [ -n "$FAIL_ON_CONFIDENCE" ]; then
            if [ "$FAIL_ON_CONFIDENCE" = "HIGH" ]; then
              ERROR_COUNT=$(get_error_count '[.results[] | select(.extra.severity == "ERROR" and (.extra.metadata.confidence // "LOW") == "HIGH")] | length')
            elif [ "$FAIL_ON_CONFIDENCE" = "MEDIUM" ]; then
              ERROR_COUNT=$(get_error_count '[.results[] | select(.extra.severity == "ERROR" and ((.extra.metadata.confidence // "LOW") == "HIGH" or (.extra.metadata.confidence // "LOW") == "MEDIUM"))] | length')
            elif [ "$FAIL_ON_CONFIDENCE" = "LOW" ]; then
              ERROR_COUNT=$(get_error_count '[.results[] | select(.extra.severity == "ERROR")] | length')
            else
              echo "⚠️ Warning: Invalid semgrep-fail-on-confidence value '$FAIL_ON_CONFIDENCE'. Valid options: LOW, MEDIUM, HIGH. Skipping fail-on-confidence check."
            fi
          fi

          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "❌ Pipeline failed: Found $ERROR_COUNT ERROR severity finding(s) at or above confidence $FAIL_ON_CONFIDENCE"
            exit 1
          fi
        fi

    - name: Create Findings Summary
      shell: bash
      if: always()
      working-directory: ${{ inputs.semgrep-working-directory }}
      run: |
        format_multiline_input() {
          local label="$1"
          local value="$2"

          if [ -n "$value" ]; then
            echo "- $label:" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "  - \`$line\`" >> $GITHUB_STEP_SUMMARY
              fi
            done <<< "$value"
          else
            echo "- $label: disabled" >> $GITHUB_STEP_SUMMARY
          fi
        }

        echo "## 🔍 Semgrep SAST Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Filters Applied:**" >> $GITHUB_STEP_SUMMARY
        echo "- Working Directory: \`${{ inputs.semgrep-working-directory }}\`" >> $GITHUB_STEP_SUMMARY
        format_multiline_input "Configs" "${{ inputs.semgrep-config }}"
        if [ -n "${{ inputs.semgrep-fail-on-confidence }}" ]; then
          echo "- Fail Pipeline on ERROR Findings With Confidence: ${{ inputs.semgrep-fail-on-confidence }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- Fail Pipeline on ERROR Findings With Confidence: disabled" >> $GITHUB_STEP_SUMMARY
        fi
        format_multiline_input "Exclude Patterns" "${{ inputs.semgrep-exclude-patterns }}"
        format_multiline_input "Disabled Rules (removed from scan)" "${{ inputs.semgrep-disable-rules }}"
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "semgrep-findings.json" ]; then
          FINDINGS=$(jq '.results | length' semgrep-findings.json || echo "0")
          if [ "$FINDINGS" -gt 0 ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Show Findings ($FINDINGS total)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total Findings: $FINDINGS**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # Parse JSON and display detailed findings
            cat semgrep-findings.json | jq -r '.results[] |
              (if .extra.severity == "ERROR" then "🔴 ERROR" 
               elif .extra.severity == "WARNING" then "⚠️ WARNING"
               else "ℹ️ INFO" end) as $severity |
              (.extra.metadata.source_rule_url // "https://semgrep.dev/r/\(.check_id)") as $docs_url |
              "**\($severity)** - \(.check_id)\n" +
              "📁 \(.path):\(.start.line // "?")\n" +
              "📝 \(.extra.message // .message // "No description")\n" +
              "📚 Docs: [\($docs_url)](\($docs_url))\n" +
              (if .extra.metadata.cwe and (.extra.metadata.cwe | length) > 0 then "🔗 CWE: \(.extra.metadata.cwe | join(", "))\n" else "" end) +
              (if .extra.metadata.confidence then "⚡ Confidence: \(.extra.metadata.confidence)\n" else "" end) +
              (if .extra.metadata.owasp and (.extra.metadata.owasp | length) > 0 then "🛡️ OWASP: \(.extra.metadata.owasp | join(", "))\n" else "" end) +
              "\n---\n"' >> $GITHUB_STEP_SUMMARY || \
            grep -o '"check_id":"[^"]*"' semgrep-findings.json | sed 's/"check_id":"\(.*\)"/\1\n\n---\n/' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No security issues detected" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ No scan results found" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
