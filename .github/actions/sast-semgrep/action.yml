name: Semgrep SAST Scan
description: 'Run Semgrep static analysis security testing'
inputs:
  working-directory:
    description: 'Working directory for Semgrep'
    required: false
    default: '.'
  error-threshold:
    description: 'Number of ERROR severity findings to fail the pipeline. Set to 0 to disable (default: 0 - disabled)'
    required: false
    default: '0'
  confidence-threshold:
    description: 'Minimum confidence level to count towards error threshold. Options: NONE (disabled), LOW, MEDIUM, HIGH (default: NONE - all findings count)'
    required: false
    default: 'NONE'
  exclude-patterns:
    description: 'CLI exclude patterns to preserve Semgrep defaults. Use YAML block scalar syntax with |- and list each pattern on a new line either directories or files (e.g., exclude-patterns: |-\n  IntegrationTests/\n  renovate.json)'
    required: false
    default: ''
  disable-rules:
    description: 'Specific rule IDs to disable (newline-separated, e.g., disable-rules: |-\n  java.lang.security.sql-injection\n  python.django.security.injection.sql-injection)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install Semgrep (v1.159.0)
      shell: bash
      run: pip install semgrep==1.159.0

    - name: Run Semgrep Scan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Build exclude flags if provided (uses CLI, preserves defaults)
        EXCLUDE_FLAGS=""
        if [ -n "${{ inputs.exclude-patterns }}" ]; then
          while IFS= read -r pattern; do
            if [ -n "$pattern" ]; then
              EXCLUDE_FLAGS="$EXCLUDE_FLAGS --exclude=$pattern"
            fi
          done <<< "${{ inputs.exclude-patterns }}"
        fi
        
        # Build exclude rules flags if provided
        EXCLUDE_RULES_FLAGS=""
        if [ -n "${{ inputs.disable-rules }}" ]; then
          while IFS= read -r rule; do
            if [ -n "$rule" ]; then
              EXCLUDE_RULES_FLAGS="$EXCLUDE_RULES_FLAGS --exclude-rule=$rule"
            fi
          done <<< "${{ inputs.disable-rules }}"
        fi
        
        # Run semgrep scan (ignore exit code since we handle errors ourselves)
        semgrep ci \
          --config=auto \
          --json \
          --output="semgrep-findings.json" \
          $EXCLUDE_FLAGS \
          $EXCLUDE_RULES_FLAGS 2>&1 | grep -v "Has findings for blocking rules" || true
        
        # Check for ERROR severity findings and fail if threshold is exceeded
        if [ -f "semgrep-findings.json" ]; then
          CONFIDENCE_THRESHOLD="${{ inputs.confidence-threshold }}"
          
          # Build jq filter based on confidence threshold
          if [ "$CONFIDENCE_THRESHOLD" = "NONE" ]; then
            # Count all ERROR findings regardless of confidence
            ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-findings.json || echo "0")
          elif [ "$CONFIDENCE_THRESHOLD" = "HIGH" ]; then
            # Count only HIGH confidence ERROR findings
            ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR" and (.extra.metadata.confidence // "LOW") == "HIGH")] | length' semgrep-findings.json || echo "0")
          elif [ "$CONFIDENCE_THRESHOLD" = "MEDIUM" ]; then
            # Count MEDIUM and HIGH confidence ERROR findings
            ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR" and ((.extra.metadata.confidence // "LOW") == "HIGH" or (.extra.metadata.confidence // "LOW") == "MEDIUM"))] | length' semgrep-findings.json || echo "0")
          elif [ "$CONFIDENCE_THRESHOLD" = "LOW" ]; then
            # Count all ERROR findings (LOW, MEDIUM, HIGH)
            ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-findings.json || echo "0")
          else
            echo "⚠️ Warning: Invalid confidence-threshold '$CONFIDENCE_THRESHOLD'. Valid options: NONE, LOW, MEDIUM, HIGH. Defaulting to NONE."
            ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-findings.json || echo "0")
          fi
          
          ERROR_THRESHOLD=${{ inputs.error-threshold }}
          if [ "$ERROR_THRESHOLD" -gt 0 ] && [ "$ERROR_COUNT" -ge "$ERROR_THRESHOLD" ]; then
            echo "❌ Pipeline failed: Found $ERROR_COUNT critical security error(s) (threshold: $ERROR_THRESHOLD, confidence: $CONFIDENCE_THRESHOLD)"
            exit 1
          fi
        fi

    - name: Create Findings Summary
      shell: bash
      if: always()
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "## 🔍 Semgrep SAST Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Filters Applied:**" >> $GITHUB_STEP_SUMMARY
        echo "- Error Threshold: ${{ inputs.error-threshold }} (0 = disabled)" >> $GITHUB_STEP_SUMMARY
        echo "- Confidence Threshold: ${{ inputs.confidence-threshold }}" >> $GITHUB_STEP_SUMMARY
        if [ -n "${{ inputs.exclude-patterns }}" ]; then
          echo "- Exclude Patterns:" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r pattern; do
            if [ -n "$pattern" ]; then
              echo "  - \`$pattern\`" >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "${{ inputs.exclude-patterns }}"
        fi
        if [ -n "${{ inputs.disable-rules }}" ]; then
          echo "- Disabled Rules (removed from scan):" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r rule; do
            if [ -n "$rule" ]; then
              echo "  - \`$rule\`" >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "${{ inputs.disable-rules }}"
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "semgrep-findings.json" ]; then
          FINDINGS=$(jq '.results | length' semgrep-findings.json || echo "0")
          if [ "$FINDINGS" -gt 0 ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Show Findings ($FINDINGS total)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total Findings: $FINDINGS**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # Parse JSON and display detailed findings
            cat semgrep-findings.json | jq -r '.results[] | 
              (if .extra.severity == "ERROR" then "🔴 ERROR" 
               elif .extra.severity == "WARNING" then "⚠️ WARNING"
               else "ℹ️ INFO" end) as $severity |
              "**\($severity)** - \(.check_id)\n" +
              "📁 \(.path):\(.start.line // "?")\n" +
              "📝 \(.extra.message // .message // "No description")\n" +
              (if .extra.metadata.source_rule_url then "📚 Docs: \(.extra.metadata.source_rule_url)\n" else "" end) +
              (if .extra.metadata.cwe and (.extra.metadata.cwe | length) > 0 then "🔗 CWE: \(.extra.metadata.cwe | join(", "))\n" else "" end) +
              (if .extra.metadata.confidence then "⚡ Confidence: \(.extra.metadata.confidence)\n" else "" end) +
              (if .extra.metadata.owasp and (.extra.metadata.owasp | length) > 0 then "🛡️ OWASP: \(.extra.metadata.owasp | join(", "))\n" else "" end) +
              "\n---\n"' >> $GITHUB_STEP_SUMMARY || \
            grep -o '"check_id":"[^"]*"' semgrep-findings.json | sed 's/"check_id":"\(.*\)"/\1\n\n---\n/' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No security issues detected" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ No scan results found" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
